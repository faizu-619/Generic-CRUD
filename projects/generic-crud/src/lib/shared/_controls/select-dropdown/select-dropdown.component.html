<select *ngIf="!control.multiSelect" 
    [value]="value"
    (change)="onSelectChange($event)"
    (blur)="onBlur()"
    [disabled]="disabled || control.isDisabled"
    class="form-control">
    <option *ngFor="let opt of control.options" [value]="opt.key">{{opt.value}}</option>
</select>
<select *ngIf="control.multiSelect" 
    [value]="value"
    (change)="onSelectChange($event)"
    (blur)="onBlur()"
    [disabled]="disabled || control.isDisabled"
    multiple
    class="form-control">
    <option *ngFor="let opt of control.options" [value]="opt.key">{{opt.value}}</option>
</select>
