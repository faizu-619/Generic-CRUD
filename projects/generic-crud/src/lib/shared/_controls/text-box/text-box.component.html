<input *ngIf="!control.format"
       [value]="value || ''"
       (input)="onInputChange($event)"
       (blur)="onBlur()"
       [disabled]="disabled || control.isDisabled"
       [type]="control.type"
       class="form-control"
       autocomplete="off"
       autofocus="on">
