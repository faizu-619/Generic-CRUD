<div class="form-group has-float-label" [formGroup]="form"
     [ngClass]="{ 'active': hasValue, 'has-success': isValid, 'has-error': !isValid}">
  <ng-container [ngSwitch]="control.controlType">

    <gc-text-box *ngSwitchCase="1" [control]="control" [formControlName]="control.key" libControlState></gc-text-box>

    <gc-single-date *ngSwitchCase="3" [control]="control" [formControlName]="control.key"
                     libControlState></gc-single-date>

    <gc-range-date *ngSwitchCase="4" [control]="control" [formControlName]="control.key" libControlState></gc-range-date>

    <gc-select-dropdown *ngSwitchCase="5" [control]="control" [formControlName]="control.key"
                         libControlState></gc-select-dropdown>

    <gc-check-box *ngSwitchCase="6" [control]="control" [formControlName]="control.key"></gc-check-box>

    <gc-text-area *ngSwitchCase="7" [control]="control" [formControlName]="control.key"
                   libControlState></gc-text-area>

    <gc-date-of-birth *ngSwitchCase="8" [control]="control" [formControlName]="control.key"></gc-date-of-birth>

    <!-- <gc-autocomplete-textbox *ngSwitchCase="9" (valueUpdate)="searchOptions($event)" [formControlName]="control.key" libControlState
      [options]="options$" [control]="control"></gc-autocomplete-textbox> -->

    <gc-custom-filter *ngSwitchCase="10" [control]="control" [formControlName]="control.key"
                       libControlState></gc-custom-filter>

  </ng-container>

  <label *ngIf="control.controlType != 6 && control.controlType != 8 && control.controlType != 10"
         [attr.for]="control.key" class="">
    {{ control.label }}
    <i *ngIf="control.label && control.required" class="text-danger">*</i>
  </label>

  <div class="invalid-feedback d-block" gc-validation-message [control]="control" [form]="form"
       [parentFormSubmitted]="parentFormSubmitted"></div>
</div>
