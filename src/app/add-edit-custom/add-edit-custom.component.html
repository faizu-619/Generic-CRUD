<h2>Custom Form</h2>

<form (ngSubmit)="form.valid && SubmitForm()" [formGroup]="form">
  <div class="form-row">
    <div class="form-group col-md-6">
      <gc-dynamic-control [controlObject]="formSetting['email']" [form]="form" [parentFormSubmitted]="submited">
      </gc-dynamic-control>
    </div>
    <div class="form-group col-md-6">
      <gc-dynamic-control [controlObject]="formSetting['password']" [form]="form" [parentFormSubmitted]="submited">
      </gc-dynamic-control>
    </div>
  </div>
  <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['birthDate']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div>
  <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['rangeDate']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div>
  <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['address']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div>
  <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['address1']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div>
  <!-- <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['country']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div> -->
  <div class="form-row">
    <div class="form-group col-md-6">
      <gc-dynamic-control [controlObject]="formSetting['city']" [form]="form" [parentFormSubmitted]="submited">
      </gc-dynamic-control>
    </div>
    <div class="form-group col-md-4">
      <gc-dynamic-control [controlObject]="formSetting['state']" [form]="form" [parentFormSubmitted]="submited">
      </gc-dynamic-control>
    </div>
    <div class="form-group col-md-2">
      <gc-dynamic-control [controlObject]="formSetting['zip']" [form]="form" [parentFormSubmitted]="submited">
      </gc-dynamic-control>
    </div>
  </div>
  <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['agree']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div>
  <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['customSelect']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div>
  <div class="form-group">
    <gc-dynamic-control [controlObject]="formSetting['color']" [form]="form" [parentFormSubmitted]="submited">
    </gc-dynamic-control>
  </div>
  <button type="submit" class="btn btn-primary">Sign in</button>
</form>

<code>
  {{ form.value | json }}
</code>
<hr>

<h2>Dynamic Form</h2>

<gc-dynamic-form [controls]="formBasic"
    [actionButtons]="actions" (OnSubmit)="SubmitForm()"></gc-dynamic-form>
